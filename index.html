<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Carnival Calculator</title>
    <link rel="icon" type="image/png" href="images/candy_image_1_psd.png">
    <link rel="stylesheet" href="style.css">
    <!-- Clean system fonts -->
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-text">
                <h1>Калькулятор Конфет</h1>
                <p>Нажимайте на слоты инвентаря и используйте клавиши 1-5 для выбора конфет (0 для очистки).</p>
                <div class="key-legend">
                    <div class="legend-item"><span class="legend-key">1</span> <span class="dash">-</span> <div class="legend-box"><img src="images/candy_image_1_psd.png"></div></div>
                    <div class="legend-item"><span class="legend-key">2</span> <span class="dash">-</span> <div class="legend-box"><img src="images/candy_image_2_psd.png"></div></div>
                    <div class="legend-item"><span class="legend-key">3</span> <span class="dash">-</span> <div class="legend-box"><img src="images/candy_image_3_psd.png"></div></div>
                    <div class="legend-item"><span class="legend-key">4</span> <span class="dash">-</span> <div class="legend-box"><img src="images/candy_image_4_psd.png"></div></div>
                    <div class="legend-item"><span class="legend-key">5</span> <span class="dash">-</span> <div class="legend-box"><img src="images/candy_image_5_psd.png"></div></div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <!-- Inventory Section -->
            <section class="dota-panel inventory-panel">
                <h2 class="panel-title">Ваш инвентарь</h2>
                <div class="inventory-wrapper">
                    <img src="images/node_candy_store_psd.png" alt="Cauldron" class="inventory-cauldron">
                    <div class="inventory-grid" id="inventory-grid">
                        <!-- Slots will be generated by JS -->
                    </div>
                    <button id="clear-inventory-btn" class="clear-btn">Очистить</button>
                </div>
            </section>

            <div class="bottom-sections">
                <!-- Trades Section -->
                <section class="dota-panel trades-panel">
                    <h2 class="panel-title">Обмены</h2>
                    <div class="trades-container" id="trades-container">
                        <!-- Trade rows generated by JS -->
                    </div>
                </section>

                <!-- Target Section -->
                <section class="dota-panel target-panel">
                    <h2 class="panel-title">Нужная награда</h2>
                    <div class="target-inputs" id="target-inputs">
                        <!-- Target interactive slots -->
                    </div>
                    <button class="calculate-btn" id="calculate-btn">Рассчитать путь</button>
                    
                    <div class="results-container" id="results-content">
                        <p class="placeholder-text">Нажмите кнопку рассчета чтобы найти путь.</p>
                    </div>
                </section>
            </div>
        </main>
        
        <footer class="footer-credit">
            Сделано при поддержке &bull; <a href="https://github.com/3-03" target="_blank">3-03</a><br>
            <span class="tg-link">Telegram: <a href="https://t.me/DotaMiniProfile" target="_blank">@DotaMiniProfile</a></span>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
